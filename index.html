<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JP Daily">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FF6B6B">
<meta name="description" content="일본어 데일리 학습 앱">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<title>JP Daily</title>
<style>
/* ─── RESET & BASE ─── */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --coral: #FF6B6B;
  --coral-light: #FFF0F0;
  --coral-mid: #FF8E8E;
  --blue: #4ECDC4;
  --blue-light: #E0FAF8;
  --blue-dark: #2BAE9E;
  --pink: #FF8FAB;
  --pink-light: #FFEEF4;
  --yellow: #FFD93D;
  --yellow-light: #FFFBEB;
  --purple: #A78BFA;
  --purple-light: #EDE9FE;
  --green: #6BCB77;
  --green-light: #E8F8EA;
  --red: #FF4D4D;
  --red-light: #FFF0F0;
  --orange: #FF9F43;
  --orange-light: #FFF3E0;
  --teal: #26de81;
  --teal-light: #E8FFF3;
  --bg: #FDF8F8;
  --card: #FFFFFF;
  --text: #1A1A2E;
  --muted: #9E9E9E;
  --border: #F0E8E8;
  --shadow: 0 4px 24px rgba(255,107,107,0.1);
  --radius: 20px;
  --radius-sm: 12px;
  --radius-xs: 8px;
}

body {
  font-family: -apple-system, 'Hiragino Sans', 'Noto Sans JP', 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
  touch-action: manipulation;
}

/* ─── RUBY (후리가나) ─── */
ruby { ruby-align: center; }
rt {
  font-size: 0.5em;
  color: var(--coral);
  font-weight: 500;
  line-height: 1.2;
}

/* ─── HEADER ─── */
.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  padding-top: calc(12px + env(safe-area-inset-top));
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(255,107,107,0.06);
}
.header-logo { display: flex; align-items: center; gap: 8px; }
.logo-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--coral), var(--pink));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.header-logo h1 { font-size: 17px; font-weight: 800; color: var(--coral); letter-spacing: -0.5px; }
.header-right { display: flex; align-items: center; gap: 8px; }
.streak-badge {
  background: var(--yellow-light);
  border: 1px solid #FFE082;
  border-radius: 20px;
  padding: 5px 10px;
  font-size: 12px;
  font-weight: 700;
  color: #B8860B;
  display: flex; align-items: center; gap: 4px;
}
.btn-icon {
  width: 44px; height: 44px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: transparent;
  cursor: pointer;
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.btn-icon:active { background: var(--coral-light); }

/* ─── TABS ─── */
.tab-bar {
  display: flex;
  overflow-x: auto;
  gap: 6px;
  padding: 10px 14px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  scroll-snap-type: x proximity;
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab-btn {
  flex-shrink: 0;
  padding: 9px 16px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: transparent;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  min-height: 40px;
  scroll-snap-align: start;
}
.tab-btn.active {
  background: var(--coral);
  border-color: var(--coral);
  color: #fff;
  box-shadow: 0 3px 10px rgba(255,107,107,0.3);
}

/* ─── MAIN ─── */
.main { padding: 14px; padding-bottom: calc(32px + env(safe-area-inset-bottom)); }

/* ─── NAV CONTROLS ─── */
.nav-controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  gap: 6px;
}
.nav-btn {
  flex: 1;
  padding: 12px 8px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--card);
  font-size: 13px;
  font-weight: 600;
  color: var(--coral);
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  min-height: 44px;
}
.nav-btn:active { transform: scale(0.97); background: var(--coral-light); }
.nav-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
.nav-counter {
  background: var(--coral-light);
  border: 1px solid #FFD0D0;
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 13px;
  font-weight: 700;
  color: var(--coral);
  white-space: nowrap;
  min-width: 64px;
  text-align: center;
}

/* ─── CARD ─── */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px 16px 16px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  margin-bottom: 14px;
  position: relative;
}
.card-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--coral-light);
  color: var(--coral);
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  margin-bottom: 14px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ─── MAIN TEXT ─── */
.main-text {
  font-size: 56px;
  font-weight: 900;
  color: var(--text);
  text-align: center;
  margin: 8px 0 4px;
  line-height: 1.3;
  letter-spacing: -1px;
}
.main-text.lg { font-size: 80px; }
.main-text.md { font-size: 36px; letter-spacing: -0.5px; }
.main-text.sentence { font-size: 22px; font-weight: 700; letter-spacing: 0; line-height: 1.6; text-align: left; }

/* 발음 표시줄 */
.reading-row {
  text-align: center;
  font-size: 18px;
  color: var(--coral);
  font-weight: 500;
  margin-bottom: 8px;
  letter-spacing: 1px;
}

/* ─── TTS BUTTON ─── */
.tts-btn {
  position: absolute;
  top: 16px; right: 14px;
  width: 44px; height: 44px;
  border-radius: var(--radius-xs);
  background: var(--blue-light);
  border: 1px solid #B2EBE8;
  color: var(--blue-dark);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.tts-btn:active { transform: scale(0.9); background: var(--blue); color: #fff; }
.tts-btn.inline {
  position: static;
  width: 38px; height: 38px;
  font-size: 16px;
}

/* ─── REVEAL BOX ─── */
.reveal-label {
  font-size: 11px;
  color: var(--muted);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin: 12px 0 6px;
}
.reveal-box {
  background: #F5F5F5;
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.2s;
  border: 1.5px dashed #DDD;
  min-height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
}
.reveal-box.revealed { background: var(--blue-light); border: 1.5px solid var(--blue); }
.reveal-hint { font-size: 13px; color: var(--muted); }
.reveal-content { font-size: 15px; font-weight: 600; color: var(--text); text-align: center; line-height: 1.5; display: none; }
.reveal-box.revealed .reveal-hint { display: none; }
.reveal-box.revealed .reveal-content { display: block; }

/* ─── SECTION DIVIDER ─── */
.section-divider {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin: 16px 0 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ─── INFO ROW ─── */
.info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  gap: 12px;
}
.info-row:last-child { border-bottom: none; }
.info-label { color: var(--muted); font-size: 12px; font-weight: 600; flex-shrink: 0; }
.info-val { font-weight: 600; color: var(--text); }

/* ─── BADGES ─── */
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
}
.badge-blue { background: var(--blue-light); color: var(--blue-dark); }
.badge-coral { background: var(--coral-light); color: var(--coral); }
.badge-purple { background: var(--purple-light); color: #6D28D9; }
.badge-orange { background: var(--orange-light); color: #C05621; }
.badge-green { background: var(--green-light); color: #276E2F; }
.badge-teal { background: var(--teal-light); color: #087F5B; }
.pill-row { display: flex; gap: 6px; flex-wrap: wrap; }

/* ─── TYPE BADGE COLORS ─── */
.type-명사 { background: #EEF2FF; color: #3730A3; }
.type-동사 { background: #FFF0F0; color: #C0392B; }
.type-형용사 { background: #F0FFF4; color: #276E2F; }
.type-い형용사 { background: #F0FFF4; color: #276E2F; }
.type-な형용사 { background: #E8F5E9; color: #1B5E20; }
.type-조사 { background: #FFF8E1; color: #E65100; }
.type-부사 { background: #E3F2FD; color: #0D47A1; }
.type-정중체 { background: #F3E5F5; color: #6A1B9A; }
.type-종조사 { background: #FBE9E7; color: #BF360C; }
.type-접속사 { background: #E8F5E9; color: #1B5E20; }
.type-기타 { background: #F5F5F5; color: #616161; }

/* ─── TOKEN BREAKDOWN ─── */
.token-grid {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 4px;
}
.token-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  background: #FAFAFA;
  border-radius: var(--radius-xs);
  border: 1px solid var(--border);
  min-height: 48px;
}
.token-text { font-size: 16px; font-weight: 700; color: var(--text); min-width: 44px; }
.token-reading { font-size: 11px; color: var(--muted); margin-top: 2px; }
.token-type { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; flex-shrink: 0; }
.token-meaning { font-size: 13px; color: var(--text); font-weight: 500; margin-left: auto; text-align: right; }

/* ─── CONJUGATION TABLE ─── */
.conj-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 6px; border-radius: var(--radius-sm); overflow: hidden; }
.conj-table th { background: var(--coral-light); color: var(--coral); padding: 7px 10px; font-weight: 700; text-align: left; font-size: 11px; }
.conj-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
.conj-table tr:last-child td { border-bottom: none; }
.conj-table .form-label { color: var(--muted); font-size: 12px; }
.conj-table .form-val { font-weight: 700; font-size: 15px; }
.conj-table .form-reading { font-size: 11px; color: var(--coral); }
.conj-table .form-meaning { font-size: 12px; color: #666; }

/* ─── DIALOGUE (CONVERSATION) ─── */
.dialogue { display: flex; flex-direction: column; gap: 12px; margin: 8px 0; }
.bubble-wrap { display: flex; align-items: flex-start; gap: 8px; }
.bubble-wrap.b { flex-direction: row-reverse; }
.bubble-avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  margin-top: 2px;
}
.avatar-a { background: var(--coral-light); }
.avatar-b { background: var(--blue-light); }
.bubble {
  max-width: 82%;
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.5;
}
.bubble-a { background: var(--coral-light); border: 1px solid #FFD0D0; border-bottom-left-radius: 4px; }
.bubble-b { background: var(--blue-light); border: 1px solid #B2EBE8; border-bottom-right-radius: 4px; }
.bubble-jp { font-weight: 700; color: var(--text); font-size: 15px; line-height: 1.7; }
.bubble-sub { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.4; }

/* ─── KATAKANA PAIR ─── */
.kana-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.kana-single {
  background: var(--coral-light);
  border: 1.5px solid #FFD0D0;
  border-radius: var(--radius-sm);
  padding: 16px 12px;
  text-align: center;
}
.kana-char { font-size: 48px; font-weight: 900; color: var(--text); line-height: 1; }
.kana-romaji { font-size: 16px; font-weight: 700; color: var(--coral); margin-top: 4px; }
.kana-sound { font-size: 13px; color: var(--muted); margin-top: 2px; }

/* ─── KANJI BIG ─── */
.kanji-big {
  font-size: 88px;
  text-align: center;
  line-height: 1;
  font-weight: 900;
  letter-spacing: -2px;
}

/* ─── SKELETON ─── */
.skeleton { border-radius: var(--radius); padding: 24px; background: var(--card); border: 1px solid var(--border); }
.skel-line {
  background: linear-gradient(90deg, #F0F0F0 25%, #E8E8E8 50%, #F0F0F0 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: var(--radius-xs);
  margin-bottom: 10px;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ─── FETCH BUTTON ─── */
.fetch-btn {
  width: 100%;
  padding: 16px;
  border-radius: var(--radius);
  background: linear-gradient(135deg, var(--coral), var(--pink));
  border: none;
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 18px rgba(255,107,107,0.32);
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  letter-spacing: -0.2px;
  min-height: 52px;
}
.fetch-btn:active { transform: scale(0.98); box-shadow: none; }
.fetch-btn:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

/* ─── GRAMMAR BOX ─── */
.grammar-box {
  background: var(--purple-light);
  border: 1px solid #C4B5FD;
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-size: 13px;
  line-height: 1.7;
  color: #5B21B6;
  margin-top: 4px;
}

/* ─── QUIZ ─── */
.quiz-header { text-align: center; margin-bottom: 16px; }
.quiz-progress-bar { background: var(--border); border-radius: 10px; height: 8px; margin: 10px 0; overflow: hidden; }
.quiz-progress-fill {
  background: linear-gradient(90deg, var(--coral), var(--pink));
  height: 100%;
  border-radius: 10px;
  transition: width 0.4s ease;
}
.quiz-question {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  margin-bottom: 14px;
  text-align: center;
}
.quiz-q-text { font-size: 19px; font-weight: 700; margin-bottom: 4px; line-height: 1.4; }
.quiz-q-sub { font-size: 13px; color: var(--muted); }
.quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.quiz-opt {
  padding: 14px 10px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--card);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  word-break: keep-all;
  line-height: 1.3;
  min-height: 52px;
  display: flex; align-items: center; justify-content: center;
}
.quiz-opt:active:not(.disabled) { transform: scale(0.97); }
.quiz-opt.correct { background: var(--green-light); border-color: var(--green); color: #276E2F; }
.quiz-opt.wrong { background: var(--red-light); border-color: var(--red); color: #C0392B; }
.quiz-opt.disabled { pointer-events: none; }
.quiz-explanation {
  background: var(--yellow-light);
  border: 1px solid #FFE082;
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-size: 14px;
  margin-bottom: 12px;
  line-height: 1.6;
  color: #5D4037;
}
.quiz-next-btn {
  width: 100%;
  padding: 14px;
  border-radius: var(--radius-sm);
  background: var(--coral);
  border: none;
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.quiz-next-btn:active { transform: scale(0.98); }
.quiz-result { text-align: center; padding: 24px 16px; }
.quiz-score-big { font-size: 68px; font-weight: 900; color: var(--coral); line-height: 1; }
.quiz-restart {
  margin-top: 16px;
  padding: 14px 40px;
  border-radius: var(--radius-sm);
  background: var(--coral);
  border: none;
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  display: block;
  width: 100%;
}
.quiz-restart.outline {
  background: transparent;
  color: var(--coral);
  border: 1.5px solid var(--coral);
  margin-top: 10px;
}

/* ─── SETTINGS MODAL ─── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 200;
  display: flex; align-items: flex-end; justify-content: center;
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
}
.modal-sheet {
  background: var(--card);
  border-radius: 24px 24px 0 0;
  padding: 20px 20px calc(24px + env(safe-area-inset-bottom));
  width: 100%;
  max-width: 480px;
  max-height: 85vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
.modal-title { font-size: 18px; font-weight: 800; margin-bottom: 16px; }
.settings-section-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 8px; }
.api-input {
  width: 100%;
  padding: 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-family: monospace;
  color: var(--text);
  background: var(--bg);
  transition: border-color 0.15s;
  -webkit-appearance: none;
  appearance: none;
}
.api-input:focus { outline: none; border-color: var(--coral); }
.settings-info { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.5; }
.settings-info a { color: var(--coral); text-decoration: none; }
.save-btn {
  width: 100%; margin-top: 16px; padding: 16px;
  border-radius: var(--radius-sm);
  background: var(--coral); border: none;
  color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
  min-height: 52px;
}
.save-btn:active { transform: scale(0.98); }
.reset-btn {
  width: 100%; margin-top: 10px; padding: 14px;
  border-radius: var(--radius-sm);
  background: transparent; border: 1.5px solid var(--border);
  color: var(--muted); font-size: 14px; font-weight: 600; cursor: pointer;
  min-height: 48px;
}
.reset-btn:active { transform: scale(0.98); }

.empty-state { text-align: center; padding: 44px 24px; color: var(--muted); }
.empty-state .big-icon { font-size: 52px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; line-height: 1.7; }

/* ─── FAVORITES ─── */
.fav-bar {
  display: flex;
  justify-content: flex-end;

<script>
/* ═══════════════════════════════════════════
   STATE & STORAGE
═══════════════════════════════════════════ */
const STORAGE_KEY = 'jp_daily_v3';
let currentTab = 'katakana';
let state = {};
let quizState = null;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = JSON.parse(raw);
  } catch(e) {}
  // defaults
  if (!state.data) state.data = { katakana:[], verb:[], sentence:[], kanji:[], conversation:[] };
  if (!state.idx) state.idx = { katakana:0, verb:0, sentence:0, kanji:0, conversation:0 };
  if (!state.streak) state.streak = { count:0, lastDate:'' };
  if (!state.apiKey) state.apiKey = '';
  if (!state.favorites) state.favorites = { katakana:[], verb:[], sentence:[], kanji:[], conversation:[] };
  if (!state.history) state.history = {};
  if (!state.lastResetDate) state.lastResetDate = '';
  if (!state.culture) state.culture = null;
  if (!state.cultureDate) state.cultureDate = '';
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function getApiKey() {
  const input = document.getElementById('apiKeyInput');
  return (input ? input.value.trim() : '') || state.apiKey || '';
}

/* ═══════════════════════════════════════════
   STREAK
═══════════════════════════════════════════ */
function updateStreak() {
  const today = new Date().toDateString();
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (state.streak.lastDate === today) return;
  if (state.streak.lastDate === yesterday) state.streak.count++;
  else state.streak.count = 1;
  state.streak.lastDate = today;
  saveState();
  document.getElementById('streakCount').textContent = state.streak.count;
}

/* ═══════════════════════════════════════════
   SETTINGS
═══════════════════════════════════════════ */
function openSettings() {
  document.getElementById('apiKeyInput').value = state.apiKey || '';
  document.getElementById('settingsModal').style.display = 'flex';
}
function closeSettingsOverlay(e) {
  if (e.target.id === 'settingsModal') document.getElementById('settingsModal').style.display = 'none';
}
function saveSettings() {
  state.apiKey = document.getElementById('apiKeyInput').value.trim();
  saveState();
  document.getElementById('settingsModal').style.display = 'none';
  showToast('저장되었습니다 ✓');
}
function recordStudy(tab) {
  const today = new Date().toISOString().slice(0,10);
  if (!state.history[today]) state.history[today] = {};
  state.history[today][tab] = (state.history[today][tab] || 0) + 1;
  saveState();
}
function resetAllData() {
  if (!confirm('모든 학습 데이터를 삭제할까요?')) return;
  state.data = { katakana:[], verb:[], sentence:[], kanji:[], conversation:[] };
  state.idx = { katakana:0, verb:0, sentence:0, kanji:0, conversation:0 };
  state.favorites = { katakana:[], verb:[], sentence:[], kanji:[], conversation:[] };
  state.history = {};
  favFilterActive = false;
  saveState();
  document.getElementById('settingsModal').style.display = 'none';
  render();
}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#1A1A2E;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:600;z-index:999;transition:opacity 0.3s;white-space:nowrap;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 2000);
}

/* ═══════════════════════════════════════════
   TTS (모바일 호환)
═══════════════════════════════════════════ */
let ttsVoices = [];
let ttsReady = false;

function loadVoices() {
  ttsVoices = speechSynthesis.getVoices();
  if (ttsVoices.length > 0) ttsReady = true;
}

if (window.speechSynthesis) {
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}

function getJaVoice() {
  return ttsVoices.find(v => v.lang === 'ja-JP')
    || ttsVoices.find(v => v.lang.startsWith('ja'))
    || null;
}

function speak(text) {
  if (!text) return;
  if (!window.speechSynthesis) return showToast('TTS를 지원하지 않는 브라우저입니다');

  // iOS Safari: cancel 후 약간의 지연 필요
  speechSynthesis.cancel();

  const doSpeak = () => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    u.rate = 0.88;
    const voice = getJaVoice();
    if (voice) u.voice = voice;
    u.onerror = (e) => {
      if (e.error !== 'canceled') showToast('음성 재생에 실패했어요');
    };
    speechSynthesis.speak(u);
  };

  // iOS 워크어라운드: cancel 직후 speak하면 무시되는 버그
  setTimeout(doSpeak, 100);
}

function speakLine(convIdx, lineIdx) {
  const conv = state.data.conversation[convIdx];
  if (conv && conv.lines[lineIdx]) speak(conv.lines[lineIdx].jp);
}

function speakSequence(texts, delay = 800) {
  if (!window.speechSynthesis) return showToast('TTS를 지원하지 않는 브라우저입니다');
  if (!texts || texts.length === 0) return;
  speechSynthesis.cancel();
  let i = 0;
  function next() {
    if (i >= texts.length) return;
    setTimeout(() => {
      const u = new SpeechSynthesisUtterance(texts[i]);
      u.lang = 'ja-JP';
      u.rate = 0.85;
      const voice = getJaVoice();
      if (voice) u.voice = voice;
      u.onend = () => { i++; setTimeout(next, delay); };
      u.onerror = () => { i++; setTimeout(next, delay); };
      speechSynthesis.speak(u);
    }, i === 0 ? 100 : 0);
  }
  next();
}

/* ═══════════════════════════════════════════
   RUBY RENDERING
═══════════════════════════════════════════ */
// pairs: [{base:"食", ruby:"た"}, {base:"べる", ruby:""}]
function renderRuby(pairs) {
  if (!pairs || !Array.isArray(pairs)) return '';
  return pairs.map(p =>
    p.ruby ? `<ruby>${p.base}<rt>${p.ruby}</rt></ruby>` : p.base
  ).join('');
}

/* ═══════════════════════════════════════════
   REVEAL BOX
═══════════════════════════════════════════ */

/* ═══════════════════════════════════════════
   FAVORITES
═══════════════════════════════════════════ */
let favFilterActive = false;

function toggleFavorite(tab, idx) {
  const favs = state.favorites[tab];
  const pos = favs.indexOf(idx);
  if (pos === -1) favs.push(idx);
  else favs.splice(pos, 1);
  saveState();
  render();
}
function isFavorite(tab, idx) {
  return state.favorites[tab].includes(idx);
}
function favBtnHTML(tab, idx) {
  const active = isFavorite(tab, idx) ? ' active' : '';
  return `<div class="fav-bar"><button class="fav-btn${active}" onclick="event.stopPropagation();toggleFavorite('${tab}',${idx})">★ ${active ? '즐겨찾기 해제' : '즐겨찾기'}</button></div>`;
}
function toggleFavFilter() {
  favFilterActive = !favFilterActive;
  render();
}
function favFilterBtnHTML() {
  const active = favFilterActive ? ' active' : '';
  return `<button class="fav-filter-btn${active}" onclick="toggleFavFilter()">★ 즐겨찾기만</button>`;
}

/* ═══════════════════════════════════════════
   NAV HTML
═══════════════════════════════════════════ */
function getFilteredIndices(tab) {
  if (!favFilterActive) return null;
  const arr = state.data[tab] || [];
  return arr.map((_, i) => i).filter(i => state.favorites[tab].includes(i));
}

function navHTML(tab) {
  const arr = state.data[tab] || [];
  const filtered = getFilteredIndices(tab);
  const idx = state.idx[tab] || 0;

  let total, currentPos, prevDisabled, nextDisabled;
  if (filtered) {
    total = filtered.length;
    currentPos = filtered.indexOf(idx);
    if (currentPos === -1) currentPos = 0;
    prevDisabled = currentPos <= 0;
    nextDisabled = currentPos >= total - 1;
  } else {
    total = arr.length;
    currentPos = idx;
    prevDisabled = idx <= 0;
    nextDisabled = idx >= total - 1;
  }
  const display = total === 0 ? '0 / 0' : `${(total > 0 ? currentPos + 1 : 0)} / ${total}`;

  return `<div class="nav-controls">
  <button class="nav-btn" onclick="navigate('${tab}',-1)" ${prevDisabled ? 'disabled' : ''}>◀ 이전 복습</button>
  <div class="nav-counter">${display}</div>
  <button class="nav-btn" onclick="navigate('${tab}',1)" ${nextDisabled ? 'disabled' : ''}>다음 학습 ▶</button>
</div>
<div style="display:flex;justify-content:flex-end;margin-bottom:10px">${favFilterBtnHTML()}</div>`;
}
function navigate(tab, dir) {
  const arr = state.data[tab];
  if (!arr || arr.length === 0) return;
  const filtered = getFilteredIndices(tab);
  if (filtered) {
    if (filtered.length === 0) return;
    const currentPos = filtered.indexOf(state.idx[tab]);
    let newPos = (currentPos === -1 ? 0 : currentPos) + dir;
    newPos = Math.max(0, Math.min(filtered.length - 1, newPos));
    state.idx[tab] = filtered[newPos];
  } else {
    let idx = state.idx[tab] + dir;
    idx = Math.max(0, Math.min(arr.length - 1, idx));
    state.idx[tab] = idx;
  }
  saveState();
  render();
}

/* ═══════════════════════════════════════════
   SKELETON
═══════════════════════════════════════════ */

<div class="skeleton">

/* ═══════════════════════════════════════════
   API CALL
═══════════════════════════════════════════ */
async function callClaude(prompt) {
  const key = getApiKey();
  if (!key) {
    openSettings();
    throw new Error('NO_KEY');
  }
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 2000,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (res.status === 429) throw new Error('RATE_LIMIT');
  if (res.status === 401) throw new Error('AUTH');
  if (!res.ok) throw new Error('API_' + res.status);
  const data = await res.json();
  let text = data.content.map(c => c.text || '').join('');
  // strip markdown fences
  text = text.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
  return JSON.parse(text);
}

function handleApiError(e) {
  if (e.message === 'NO_KEY') return;
  if (e.message === 'RATE_LIMIT') showToast('⚠️ API 한도 초과 (429). 잠시 후 다시 시도하세요.');
  else if (e.message === 'AUTH') showToast('❌ API 키 오류. 설정을 확인해주세요.');
  else showToast('오류: ' + e.message);
}

/* ═══════════════════════════════════════════
   FETCH HANDLERS
═══════════════════════════════════════════ */
async function fetchNew(tab) {
  updateStreak();
  showSkeleton();
  try {
    let result;
    const existing = state.data[tab] || [];

    if (tab === 'katakana') result = await callClaude(promptKatakana(existing));
    else if (tab === 'verb') result = await callClaude(promptVerb(existing));
    else if (tab === 'sentence') result = await callClaude(promptSentence(existing));
    else if (tab === 'kanji') result = await callClaude(promptKanji(existing));
    else if (tab === 'conversation') result = await callClaude(promptConversation(existing));

    state.data[tab].push(result);
    state.idx[tab] = state.data[tab].length - 1;
    recordStudy(tab);
    saveState();
    render();
  } catch(e) {
    handleApiError(e);
    render();
  }
}

/* ═══════════════════════════════════════════
   QUIZ
═══════════════════════════════════════════ */
function buildQuizQuestions() {
  const pool = [];
  const d = state.data;

  // 카타카나 — 양방향
  d.katakana.forEach(item => {
    item.pair.forEach(ch => {
      pool.push({ type:'choice', q: `카타카나 「${ch.char}」의 발음은?`, a: ch.korean_sound, exp: `${ch.char} = ${ch.romaji} (${ch.korean_sound})`, pool_group:'kata_sound' });
      pool.push({ type:'choice', q: `「${ch.korean_sound}」에 해당하는 카타카나는?`, a: ch.char, exp: `${ch.korean_sound} = ${ch.char} (${ch.romaji})`, pool_group:'kata_char' });
    });
  });

  // 동사 — 뜻→동사, 동사→뜻
  d.verb.forEach(item => {
    pool.push({ type:'choice', q: `동사 「${item.verb}」의 뜻은?`, a: item.meaning, exp: `${item.verb} (${item.ruby_pairs.map(p=>p.ruby||p.base).join('')}) = ${item.meaning}`, pool_group:'verb_meaning' });
    pool.push({ type:'choice', q: `「${item.meaning}」에 해당하는 일본어 동사는?`, a: item.verb, exp: `${item.meaning} = ${item.verb}`, pool_group:'verb_word' });
    const masu = item.conjugations.find(c => c.form === 'ます형');
    if (masu) pool.push({ type:'choice', q: `「${item.verb}」의 ます형은?`, a: masu.value, exp: `${item.verb} → ${masu.value} (${masu.reading})`, pool_group:'verb_conj' });
  });

  // 문장 — 뜻 맞추기 + 토큰 양방향
  d.sentence.forEach(item => {
    pool.push({ type:'choice', q: `「${item.sentence}」의 한국어 뜻은?`, a: item.meaning, exp: item.grammar, pool_group:'sent_meaning' });

    // 문장 배열 퀴즈
    if (item.tokens && item.tokens.length >= 3 && item.tokens.length <= 8) {
      const words = item.tokens.map(t => t.text);
      pool.push({ type:'arrange', q: '다음 단어를 올바른 순서로 배열하세요', words: words, answer_sentence: item.sentence, exp: `정답: ${item.sentence} (${item.meaning})`, pool_group:'arrange' });
    }

    (item.tokens || []).filter(t => t.type === '명사' || t.type === '동사').forEach(tok => {
      pool.push({ type:'choice', q: `「${tok.text}」의 뜻은?`, a: tok.meaning, exp: `${tok.text} (${tok.reading}) = ${tok.meaning} [${tok.type}]`, pool_group:'tok_meaning' });
      pool.push({ type:'choice', q: `「${tok.meaning}」에 해당하는 일본어는?`, a: tok.text, exp: `${tok.meaning} = ${tok.text} (${tok.reading})`, pool_group:'tok_word' });
    });
  });

  // 한자 — 양방향
  d.kanji.forEach(item => {
    pool.push({ type:'choice', q: `한자 「${item.kanji}」의 뜻은?`, a: item.meaning, exp: `${item.kanji} : 음독 ${item.onyomi}, 훈독 ${item.kunyomi}`, pool_group:'kanji_meaning' });
    pool.push({ type:'choice', q: `「${item.meaning}」에 해당하는 한자는?`, a: item.kanji, exp: `${item.meaning} = ${item.kanji}`, pool_group:'kanji_char' });
    pool.push({ type:'choice', q: `한자 「${item.kanji}」의 음독은?`, a: item.onyomi, exp: `${item.kanji}의 음독 = ${item.onyomi}`, pool_group:'kanji_onyomi' });
  });

  if (pool.length < 4) return null;

  // 선택형 답안 생성
  const allAnswersByGroup = {};
  pool.filter(p => p.type === 'choice').forEach(p => {
    if (!allAnswersByGroup[p.pool_group]) allAnswersByGroup[p.pool_group] = [];
    allAnswersByGroup[p.pool_group].push(p.a);
  });
  const allAnswers = pool.filter(p => p.type === 'choice').map(p => p.a);

  const shuffled = pool.sort(() => Math.random() - 0.5).slice(0, 10);

  return shuffled.map(q => {
    if (q.type === 'arrange') {
      // 문장 배열 — 단어를 섞어서 제공
      const shuffledWords = [...q.words].sort(() => Math.random() - 0.5);
      return { ...q, shuffledWords };
    }
    // 같은 그룹에서 오답 먼저 찾고, 부족하면 전체에서
    let sameGroup = (allAnswersByGroup[q.pool_group] || []).filter(a => a !== q.a);
    let wrongs = sameGroup.sort(() => Math.random() - 0.5).slice(0, 3);
    if (wrongs.length < 3) {
      const more = allAnswers.filter(a => a !== q.a && !wrongs.includes(a)).sort(() => Math.random() - 0.5).slice(0, 3 - wrongs.length);
      wrongs = [...wrongs, ...more];
    }
    const opts = [q.a, ...wrongs].sort(() => Math.random() - 0.5);
    return { ...q, opts };
  });
}

function renderQuiz() {
  const total = Object.values(state.data).reduce((s, a) => s + a.length, 0);
  const kataTotal = state.data.katakana.reduce((s, x) => s + x.pair.length, 0);

  if (total < 2) {
    return `<div class="empty-state">
      <div class="big-icon">🎯</div>
      <p>퀴즈를 풀려면 먼저<br>학습 데이터가 필요해요!<br><br>다른 탭에서 먼저 공부해주세요.</p>
    </div>`;
  }

  // 결과 화면
  if (quizState && quizState.done) {
    const total = quizState.questions.length;
    const score = quizState.score;
    const pct = Math.round(score / total * 100);
    const emoji = pct >= 80 ? '🎉' : pct >= 50 ? '😊' : '💪';
    const msg = pct >= 80 ? '완벽해요! 실력이 느셨네요!' : pct >= 50 ? '잘 하고 있어요! 계속 연습해봐요.' : '더 학습하고 다시 도전해봐요!';
    return `<div class="quiz-result">
      <div style="font-size:52px;margin-bottom:12px">${emoji}</div>
      <div class="quiz-score-big">${score}<span style="font-size:28px;color:var(--muted)"> / ${total}</span></div>
      <div style="font-size:16px;color:var(--muted);margin:8px 0">${pct}% 정답률</div>
      <div style="font-size:14px;color:#666;margin-bottom:20px">${msg}</div>
      <button class="quiz-restart" onclick="startQuiz()">다시 풀기 🔄</button>
      <button class="quiz-restart outline" onclick="quizState=null;render()">처음으로</button>
    </div>`;
  }

  // 시작 화면
  if (!quizState) {
    return `<div style="text-align:center;padding:32px 16px">
      <div style="font-size:64px;margin-bottom:12px">🎯</div>
      <div style="font-size:22px;font-weight:800;margin-bottom:8px;letter-spacing:-0.5px">퀴즈 도전!</div>
      <div style="font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:28px">
        지금까지 학습한 카타카나 ${kataTotal}자,<br>
        동사 ${state.data.verb.length}개, 문장 ${state.data.sentence.length}개,<br>
        한자 ${state.data.kanji.length}개를 바탕으로<br>
        무작위 10문제를 출제합니다.
      </div>
      <button class="fetch-btn" onclick="startQuiz()">퀴즈 시작하기 🚀</button>
    </div>`;
  }

  // 문제 화면
  const qs = quizState.questions;
  const ci = quizState.currentIdx;
  const q = qs[ci];
  const answered = quizState.answered;
  const pct = Math.round(ci / qs.length * 100);

  let questionBody = '';

  if (q.type === 'arrange') {
    // 문장 배열 퀴즈
    if (!quizState.arrangeSelected) quizState.arrangeSelected = [];
    const selected = quizState.arrangeSelected;
    const remaining = q.shuffledWords.filter((w,i) => !selected.includes(i));

    const selectedHTML = selected.length > 0
      ? selected.map((si, pos) => `<span onclick="removeArrangeWord(${pos})" style="display:inline-block;padding:8px 12px;margin:3px;border-radius:var(--radius-xs);background:var(--coral-light);border:1px solid var(--coral);color:var(--coral);font-size:16px;font-weight:700;cursor:pointer">${q.shuffledWords[si]}</span>`).join('')
      : '<span style="color:var(--muted);font-size:14px">👆 아래 단어를 순서대로 터치하세요</span>';

    const wordsHTML = q.shuffledWords.map((w, i) => {
      const used = selected.includes(i);
      return `<button onclick="selectArrangeWord(${i})" style="padding:10px 14px;margin:3px;border-radius:var(--radius-xs);border:1.5px solid ${used ? '#EEE' : 'var(--border)'};background:${used ? '#F5F5F5' : 'var(--card)'};color:${used ? '#CCC' : 'var(--text)'};font-size:16px;font-weight:600;cursor:${used ? 'default' : 'pointer'};min-height:44px" ${used ? 'disabled' : ''}>${w}</button>`;
    }).join('');

    const canSubmit = selected.length === q.shuffledWords.length && !answered;

    questionBody = `<div class="quiz-question">
      <div class="quiz-q-text">${q.q}</div>
    </div>
    <div style="min-height:56px;padding:12px;background:#FAFAFA;border-radius:var(--radius-sm);border:1.5px dashed var(--border);margin-bottom:12px;text-align:center;line-height:2.2">
      ${selectedHTML}
    </div>
    <div style="text-align:center;margin-bottom:12px;line-height:2">
      ${wordsHTML}
    </div>
    ${canSubmit ? `<button class="quiz-next-btn" onclick="submitArrange()" style="margin-bottom:12px">확인하기 ✓</button>` : ''}`;
  } else {
    // 선택형 퀴즈
    const optsHTML = q.opts.map(opt => {
      let cls = 'quiz-opt';
      if (answered) {
        if (opt === q.a) cls += ' correct';
        else if (opt === quizState.chosen) cls += ' wrong';
        cls += ' disabled';
      }
      const safeOpt = opt.replace(/'/g, "\\'").replace(/"/g, '&quot;');
      return `<button class="${cls}" onclick="answerQuiz(this, '${safeOpt}')">${opt}</button>`;
    }).join('');

    questionBody = `<div class="quiz-question">
      <div class="quiz-q-text" style="font-size:20px">${q.q}</div>
    </div>
    <div class="quiz-options">${optsHTML}</div>`;
  }

  const explanationHTML = answered ? `
    <div class="quiz-explanation">
      ${quizState.correct ? '✅ 정답!' : `❌ 오답! 정답은 <strong>${q.a || q.answer_sentence}</strong>`}<br>
      <span style="font-size:13px;color:#795548;margin-top:4px;display:block">${q.exp || ''}</span>
    </div>
    <button class="quiz-next-btn" onclick="nextQuiz()">
      ${ci < qs.length - 1 ? '다음 문제 →' : '결과 보기 🏁'}
    </button>` : '';

  return `<div class="quiz-header">
    <div style="font-size:13px;color:var(--muted);font-weight:600">${ci + 1} / ${qs.length} 문제</div>
    <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
    <div style="font-size:13px;color:var(--muted)">현재 점수 ${quizState.score}점</div>
  </div>
  ${questionBody}
  ${explanationHTML}`;
}

function startQuiz() {
  const questions = buildQuizQuestions();
  if (!questions) return showToast('학습 데이터가 부족해요. 더 학습해주세요!');
  quizState = { questions, currentIdx: 0, score: 0, answered: false, chosen: null, correct: false, done: false, arrangeSelected: [] };
  render();
}
function answerQuiz(el, chosen) {
  if (!quizState || quizState.answered) return;
  quizState.answered = true;
  quizState.chosen = chosen;
  quizState.correct = (chosen === quizState.questions[quizState.currentIdx].a);
  if (quizState.correct) quizState.score++;
  render();
}
function selectArrangeWord(idx) {
  if (!quizState || quizState.answered) return;
  if (quizState.arrangeSelected.includes(idx)) return;
  quizState.arrangeSelected.push(idx);
  render();
}
function removeArrangeWord(pos) {
  if (!quizState || quizState.answered) return;
  quizState.arrangeSelected.splice(pos, 1);
  render();
}
function submitArrange() {
  if (!quizState || quizState.answered) return;
  const q = quizState.questions[quizState.currentIdx];
  const userAnswer = quizState.arrangeSelected.map(i => q.shuffledWords[i]).join('');
  const correctAnswer = q.words.join('');
  quizState.answered = true;
  quizState.correct = (userAnswer === correctAnswer);
  if (quizState.correct) quizState.score++;
  render();
}
function nextQuiz() {
  if (!quizState) return;
  if (quizState.currentIdx < quizState.questions.length - 1) {
    quizState.currentIdx++;
    quizState.answered = false;
    quizState.chosen = null;
    quizState.correct = false;
    quizState.arrangeSelected = [];
    render();
  } else {
    quizState.done = true;
    render();
  }
}

/* ═══════════════════════════════════════════
   CALENDAR / HISTORY
═══════════════════════════════════════════ */
let calYear, calMonth;
(function() {
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
})();

function calNav(dir) {
  calMonth += dir;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  render();
}

const TAB_LABELS = { katakana:'カタカナ', verb:'동사', sentence:'문장', kanji:'한자', conversation:'회화' };
const TAB_ICONS = { katakana:'🔤', verb:'🎯', sentence:'💬', kanji:'🈳', conversation:'🗣️' };

function renderCalendar() {
  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const dayNames = ['일','월','화','수','목','금','토'];

  // stats for this month
  let monthTotal = 0;
  let studyDays = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const rec = state.history[dateStr];
    if (rec) {
      const dayTotal = Object.values(rec).reduce((s,v) => s+v, 0);
      if (dayTotal > 0) { monthTotal += dayTotal; studyDays++; }
    }
  }

  // this week favorites count
  const favTotal = Object.values(state.favorites).reduce((s,a) => s+a.length, 0);

  let html = `
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">
    <div class="cal-stat-card">
      <div class="cal-stat-num">${studyDays}</div>
      <div class="cal-stat-label">이번달 학습일</div>
    </div>
    <div class="cal-stat-card">
      <div class="cal-stat-num">${monthTotal}</div>
      <div class="cal-stat-label">이번달 학습량</div>
    </div>
    <div class="cal-stat-card">
      <div class="cal-stat-num" style="color:var(--yellow)">${favTotal}</div>
      <div class="cal-stat-label">즐겨찾기 항목</div>
    </div>
  </div>`;

  // calendar navigation
  html += `<div class="cal-nav">
    <button class="cal-nav-btn" onclick="calNav(-1)">◀</button>
    <div class="cal-month">${calYear}년 ${monthNames[calMonth]}</div>
    <button class="cal-nav-btn" onclick="calNav(1)">▶</button>
  </div>`;

  // day headers
  html += `<div class="cal-grid">`;
  dayNames.forEach(d => { html += `<div class="cal-header">${d}</div>`; });

  // empty cells before first day
  for (let i = 0; i < firstDay; i++) html += `<div class="cal-day empty"></div>`;

  // days
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const rec = state.history[dateStr];
    const dayTotal = rec ? Object.values(rec).reduce((s,v) => s+v, 0) : 0;
    const isToday = dateStr === todayStr;
    let cls = 'cal-day';
    if (isToday) cls += ' today';
    if (dayTotal > 0) cls += ' has-study';
    if (dayTotal >= 5) cls += ' high';

    html += `<div class="${cls}" onclick="showDayDetail('${dateStr}')">
      ${d}
      ${dayTotal > 0 ? '<div class="cal-dot"></div>' : ''}
    </div>`;
  }
  html += `</div>`;

  // selected day detail
  html += `<div id="calDetail"></div>`;

  // today's detail by default
  html += `<script>showDayDetail('${todayStr}')<\/script>`;

  return html;
}

function showDayDetail(dateStr) {
  const el = document.getElementById('calDetail');
  if (!el) return;
  const rec = state.history[dateStr];
  const parts = dateStr.split('-');
  const label = `${parseInt(parts[1])}월 ${parseInt(parts[2])}일`;

  if (!rec || Object.values(rec).reduce((s,v)=>s+v,0) === 0) {
    el.innerHTML = `<div class="cal-detail">
      <div style="text-align:center;color:var(--muted);padding:12px;font-size:14px">
        📅 ${label} — 학습 기록이 없습니다
      </div>
    </div>`;
    return;
  }

  let rows = '';
  Object.entries(rec).forEach(([tab, count]) => {
    rows += `<div class="cal-detail-row">
      <span>${TAB_ICONS[tab] || ''} ${TAB_LABELS[tab] || tab}</span>
      <span style="font-weight:700;color:var(--coral)">${count}개</span>
    </div>`;
  });
  const total = Object.values(rec).reduce((s,v)=>s+v,0);
  el.innerHTML = `<div class="cal-detail">
    <div style="font-size:14px;font-weight:700;margin-bottom:8px;color:var(--text)">📅 ${label} 학습 기록</div>
    ${rows}
    <div class="cal-detail-row" style="border-top:1px solid var(--border);margin-top:4px;padding-top:10px">
      <span style="font-weight:700">총 학습량</span>
      <span style="font-weight:800;color:var(--coral);font-size:16px">${total}개</span>
    </div>
  </div>`;
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  if (tab !== 'quiz') quizState = null;
  render();
}

function render() {
  const el = document.getElementById('mainContent');
  let content = '';
  switch(currentTab) {
    case 'katakana':     content = renderCultureCard() + renderKatakana(); break;
    case 'verb':         content = renderVerb(); break;
    case 'sentence':     content = renderSentence(); break;
    case 'kanji':        content = renderKanji(); break;
    case 'conversation': content = renderConversation(); break;
    case 'quiz':         content = renderQuiz(); break;
    case 'calendar':     content = renderCalendar(); break;
  }
  el.innerHTML = content;
  document.getElementById('streakCount').textContent = state.streak.count;
}

   DAILY RESET (매일 오전 7시)
═══════════════════════════════════════════ */
function checkDailyReset() {
  const now = new Date();
  const today = now.toISOString().slice(0,10);
  const hour = now.getHours();

  // 오늘 날짜 + 7시 이후인데 아직 리셋 안 한 경우
  if (state.lastResetDate !== today && hour >= 7) {
    // 각 탭의 idx를 마지막으로 이동 (새 콘텐츠 fetch 유도)
    ['katakana','verb','sentence','kanji','conversation'].forEach(tab => {
      const arr = state.data[tab];
      if (arr.length > 0) state.idx[tab] = arr.length - 1;
    });
    // 오늘의 문화 읽기 초기화
    state.culture = null;
    state.cultureDate = '';
    state.lastResetDate = today;
    saveState();
  }
}

  const today = new Date().toISOString().slice(0,10);
  if (state.culture && state.cultureDate === today) return; // 오늘 이미 로드됨

    const result = await callClaude(promptCulture());
    state.culture = result;
    state.cultureDate = today;
    recordStudy('culture');
    saveState();
    render();
  } catch(e) {
    handleApiError(e);

      <div style="font-size:15px;font-weight:700;margin-bottom:4px">오늘의 일본 문화</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:14px">매일 새로운 일본 문화 이야기를 읽어보세요</div>
      <button onclick="fetchCulture()" style="padding:10px 20px;border-radius:var(--radius-sm);background:var(--purple-light);border:1px solid #C4B5FD;color:#6D28D9;font-size:14px;font-weight:600;cursor:pointer;min-height:44px">🏯 오늘의 문화 읽기</button>
    </div>`;
  }
  return `<div class="card">
    <div class="card-tag" style="background:var(--purple-light);color:#6D28D9">${c.emoji || '🏯'} 오늘의 일본 문화</div>
    <div style="font-size:18px;font-weight:800;margin:8px 0 12px;line-height:1.4">${c.title}</div>
    <div style="font-size:15px;line-height:1.8;color:var(--text);margin-bottom:14px">${c.content}</div>
    <div style="background:var(--purple-light);border:1px solid #C4B5FD;border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:10px">
      <div style="font-size:11px;font-weight:700;color:#6D28D9;text-transform:uppercase;margin-bottom:6px">오늘의 일본어 단어</div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-size:22px;font-weight:800;color:var(--text)">${c.jp_word}</span>
        <span style="font-size:14px;color:var(--coral);font-weight:600">${c.jp_reading}</span>
        <button class="tts-btn inline" style="width:34px;height:34px;font-size:15px" onclick="speak(${JSON.stringify(c.jp_word)})">🔊</button>
      </div>
      <div style="font-size:14px;color:#5B21B6;margin-top:4px">${c.jp_meaning}</div>
    </div>
    ${c.fun_fact ? `<div style="background:var(--yellow-light);border:1px solid #FFE082;border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:#5D4037;line-height:1.6">
      💡 <strong>알고 계셨나요?</strong> ${c.fun_fact}
    </div>` : ''}
  </div>`;
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
loadState();
checkDailyReset();
document.getElementById('streakCount').textContent = state.streak.count;
render();
</script>
</body>
</html>
